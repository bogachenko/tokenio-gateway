name: Debug Cleanup Native Rewrite

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - codex/cleanup-native-model-rewrite-helpers

jobs:
  debug-cleanup-native-rewrite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run required commands and capture output
        id: checks
        run: |
          set +e
          {
            echo '$ go test ./internal/infrastructure/forwarding/anthropicnative'
            go test ./internal/infrastructure/forwarding/anthropicnative
            echo '$ go test ./internal/infrastructure/forwarding/ollamanative'
            go test ./internal/infrastructure/forwarding/ollamanative
            echo '$ go test ./internal/infrastructure/forwarding/bodyjson'
            go test ./internal/infrastructure/forwarding/bodyjson
            echo '$ go test ./...'
            go test ./...
            echo '$ go vet ./...'
            go vet ./...
          } > cleanup-native-rewrite-output.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: cleanup-native-rewrite-output
          path: cleanup-native-rewrite-output.txt
      - name: Fail when checks fail
        if: steps.checks.outputs.status != '0'
        run: exit 1
