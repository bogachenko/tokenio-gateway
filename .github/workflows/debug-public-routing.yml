name: Debug Public Routing

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - codex/route-gemini-native-model-catalog

jobs:
  debug-public-routing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run required commands
        run: |
          go test ./internal/transport/httptransport
          go test ./internal/transport/http/publicapi
          go test ./internal/transport/http/nativeapi
          go test ./...
          go vet ./...
