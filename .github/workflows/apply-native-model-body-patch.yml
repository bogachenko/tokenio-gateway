name: Apply Native Model Body Patch

on:
  push:
    branches:
      - codex/preserve-native-model-body-bytes

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/preserve-native-model-body-bytes
      - name: Apply patch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('internal/infrastructure/forwarding/ollamanative/adapter.go')
          text = p.read_text()
          old = 'return ' + 'rewriteTop' + 'Level' + 'Model' + '(body, route.ClientModel, route.ProviderModel)'
          new = 'return ' + 'replaceTop' + 'ModelBytes' + '(body, route.ClientModel, route.ProviderModel)'
          if old not in text:
              raise SystemExit('old call not found')
          p.write_text(text.replace(old, new, 1))
          Path('.github/workflows/apply-native-model-body-patch.yml').unlink()
          PY
      - name: Commit patch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'wire ollama adapter to byte preserving rewrite'
          git push origin HEAD:codex/preserve-native-model-body-bytes
