name: Debug NativeAPI Files

on:
  push:
    branches:
      - codex/reuse-native-credentials-public-catalog

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: List nativeapi files
        run: |
          find internal/transport/http -maxdepth 4 -type f | sort > nativeapi-files.txt
          grep -R "func ExtractCredential\|type Credential\|Carrier" -n internal/transport/http internal/domain >> nativeapi-files.txt || true
      - uses: actions/upload-artifact@v4
        with:
          name: nativeapi-files
          path: nativeapi-files.txt
