name: Debug Gemini Catalog Routing

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - codex/route-gemini-native-model-catalog

jobs:
  debug-gemini-catalog-routing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run required commands and capture output
        id: checks
        run: |
          set +e
          {
            echo '$ go test ./internal/transport/httptransport'
            go test ./internal/transport/httptransport
            echo '$ go test ./internal/transport/http/publicapi'
            go test ./internal/transport/http/publicapi
            echo '$ go test ./internal/transport/http/nativeapi'
            go test ./internal/transport/http/nativeapi
            echo '$ go test ./...'
            go test ./...
            echo '$ go vet ./...'
            go vet ./...
          } > gemini-catalog-routing-output.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: gemini-catalog-routing-output
          path: gemini-catalog-routing-output.txt
      - name: Fail when checks fail
        if: steps.checks.outputs.status != '0'
        run: exit 1
