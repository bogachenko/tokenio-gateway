name: Debug Go Test Output

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - codex/preserve-native-operation-path

jobs:
  debug-go-test-output:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run go test and capture output
        id: gotest
        run: |
          set +e
          go test ./... > go-test-output.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: go-test-output
          path: go-test-output.txt
      - name: Fail when go test fails
        if: steps.gotest.outputs.status != '0'
        run: exit 1
