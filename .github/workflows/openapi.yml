name: OpenAPI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  openapi:
    name: OpenAPI contract
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate OpenAPI contract
        run: bash scripts/openapi_check.sh

      - name: Upload OpenAPI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tokenio-gateway-openapi
          if-no-files-found: error
          path: |
            docs/openapi/dist/tokenio-gateway-openapi.yaml
            docs/openapi/dist/tokenio-gateway-openapi.json
            docs/openapi/dist/index.html
            docs/openapi/dist/tokenio-public-openapi.yaml
            docs/openapi/dist/tokenio-public-openapi.json
            docs/openapi/dist/public.html
