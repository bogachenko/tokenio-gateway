services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${TOKENIO_POSTGRES_DB:-tokenio}
      POSTGRES_USER: ${TOKENIO_POSTGRES_USER:-tokenio}
      POSTGRES_PASSWORD: ${TOKENIO_POSTGRES_PASSWORD:-tokenio_dev_password}
    ports:
      - "${TOKENIO_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${TOKENIO_POSTGRES_USER:-tokenio} -d ${TOKENIO_POSTGRES_DB:-tokenio}",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - tokenio-postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env.docker
        required: false
    environment:
      TOKENIO_DATABASE_DSN: ${TOKENIO_DATABASE_DSN:-postgres://tokenio:tokenio_dev_password@postgres:5432/tokenio?sslmode=disable}
      DATABASE_URL: ${DATABASE_URL:-postgres://tokenio:tokenio_dev_password@postgres:5432/tokenio?sslmode=disable}
      TOKENIO_HTTP_ADDR: ${TOKENIO_HTTP_ADDR:-:8080}
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
    ports:
      - "${TOKENIO_HTTP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  tokenio-postgres-data:
